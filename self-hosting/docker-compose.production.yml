# ============================================================================
# Secure Messenger — PRODUCTION Docker Compose
# ============================================================================
# Full production stack:
# - backend:    Axum Rust server (with Telegram Bot fallback)
# - postgres:   PostgreSQL 16 (production database)
# - redis:      Redis 7 (cache + sessions)
# - minio:      S3 storage (files, images)
# - nginx:      Reverse proxy + TLS (Let's Encrypt)
# - certbot:    Auto-renew TLS certificates
#
# Usage:
#   cp .env.production .env && nano .env
#   docker-compose -f docker-compose.production.yml up -d
# ============================================================================

version: '3.8'

services:
  # ===========================================================================
  # Backend Server (Axum Rust + Telegram Bot Fallback)
  # ===========================================================================
  backend:
    build:
      context: ..
      dockerfile: self-hosting/docker/Dockerfile
    container_name: messenger-backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DATABASE_URL=postgres://${POSTGRES_USER:-messenger}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-messenger}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-messenger-files}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-86400}
      # Telegram Bot Fallback
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-false}
      # Cloudflare
      - CLOUDFLARE_WORKER_URL=${CLOUDFLARE_WORKER_URL:-}
      # Rate limiting
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
      # SSO (optional)
      - SSO_ENABLED=${SSO_ENABLED:-false}
      - SSO_KEYCLOAK_URL=${SSO_KEYCLOAK_URL:-}
      - SSO_KEYCLOAK_REALM=${SSO_KEYCLOAK_REALM:-messenger}
      - SSO_KEYCLOAK_CLIENT_ID=${SSO_KEYCLOAK_CLIENT_ID:-}
      - SSO_KEYCLOAK_CLIENT_SECRET=${SSO_KEYCLOAK_CLIENT_SECRET:-}
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [messenger-net]
    deploy:
      resources:
        limits: { memory: 1G, cpus: '2.0' }
        reservations: { memory: 256M, cpus: '0.5' }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s; timeout: 10s; retries: 3; start_period: 15s
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }

  # ===========================================================================
  # PostgreSQL 16 — Production Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: messenger-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-messenger}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-messenger}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      - ./postgres-backups:/backups
    networks: [messenger-net]
    deploy:
      resources:
        limits: { memory: 2G, cpus: '2.0' }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-messenger} -d ${POSTGRES_DB:-messenger}"]
      interval: 10s; timeout: 5s; retries: 5; start_period: 30s
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }

  # ===========================================================================
  # Redis 7 — Cache + Sessions
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: messenger-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 900 1 --save 300 10 --save 60 10000
    volumes: [redis-data:/data]
    networks: [messenger-net]
    deploy:
      resources:
        limits: { memory: 1G, cpus: '1.0' }
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s; timeout: 5s; retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ===========================================================================
  # MinIO — S3 Object Storage
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: messenger-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes: [minio-data:/data]
    networks: [messenger-net]
    deploy:
      resources:
        limits: { memory: 2G, cpus: '1.0' }
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s; timeout: 10s; retries: 3

  # ===========================================================================
  # MinIO Setup — Create bucket on startup
  # ===========================================================================
  minio-setup:
    image: minio/mc:latest
    container_name: messenger-minio-setup
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing myminio/${MINIO_BUCKET:-messenger-files} &&
      mc anonymous set download myminio/${MINIO_BUCKET:-messenger-files}/public &&
      echo 'MinIO bucket created' && exit 0
      "
    networks: [messenger-net]

  # ===========================================================================
  # Nginx — Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: messenger-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-ssl:/etc/nginx/ssl
      - nginx-logs:/var/log/nginx
      - certbot-www:/var/www/certbot:ro
    depends_on: [backend]
    networks: [messenger-net]
    deploy:
      resources:
        limits: { memory: 512M, cpus: '1.0' }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s; timeout: 10s; retries: 3

  # ===========================================================================
  # Certbot — Auto-renew TLS (Let's Encrypt)
  # ===========================================================================
  certbot:
    image: certbot/certbot:latest
    container_name: messenger-certbot
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      certbot certonly --webroot -w /var/www/certbot
        --email ${TLS_EMAIL:-admin@your-domain.com}
        --domain ${DOMAIN_NAME:-messenger.your-domain.com}
        --agree-tos --non-interactive --keep-until-expiring
        --deploy-hook 'nginx -s reload' || true;
      while :; do sleep 12h && certbot renew --quiet; done
      "
    networks: [messenger-net]

networks:
  messenger-net:
    driver: bridge
    ipam:
      config: [{ subnet: 172.20.0.0/16 }]

volumes:
  postgres-data: { driver: local }
  redis-data: { driver: local }
  minio-data: { driver: local }
  backend-data: { driver: local }
  backend-logs: { driver: local }
  nginx-ssl: { driver: local }
  nginx-logs: { driver: local }
  certbot-data: { driver: local }
  certbot-www: { driver: local }
