# ============================================================================
# Grafana Provisioning — Dashboards
# ============================================================================

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Secure Messenger'
    folderUid: 'messenger'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
