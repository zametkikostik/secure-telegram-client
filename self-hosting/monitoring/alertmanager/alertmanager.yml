# ============================================================================
# Alertmanager Configuration
# ============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST:-smtp.gmail.com:587}'
  smtp_from: '${SMTP_FROM:-alerts@messenger.your-domain.com}'
  smtp_auth_username: '${SMTP_USER:-alerts@messenger.your-domain.com}'
  smtp_auth_password: '${SMTP_PASSWORD:-changeme}'
  slack_api_url: '${SLACK_WEBHOOK_URL:-}'

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree
route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'severity', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Security alerts → security team
    - match:
        team: security
      receiver: 'security-team'
      group_wait: 1m
      repeat_interval: 2h
      continue: true

    # Infrastructure alerts → infra team
    - match:
        team: infrastructure
      receiver: 'infra-team'
      group_wait: 2m
      repeat_interval: 4h

    # Warning alerts → daily digest
    - match:
        severity: warning
      receiver: 'warning-digest'
      group_wait: 5m
      repeat_interval: 12h

# Receivers
receivers:
  # Default receiver
  - name: 'default-receiver'
    email_configs:
      - to: 'dev-team@your-domain.com'
        send_resolved: true

  # Critical alerts → PagerDuty + Slack + Email
  - name: 'critical-alerts'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY:-}'
    slack_configs:
      - channel: '#critical-alerts'
        send_resolved: true
        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    email_configs:
      - to: 'oncall@your-domain.com'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .CommonAnnotations.summary }}'

  # Security team → Slack + Email
  - name: 'security-team'
    slack_configs:
      - channel: '#security-alerts'
        send_resolved: true
        title: '[SECURITY] {{ .CommonAnnotations.summary }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    email_configs:
      - to: 'security@your-domain.com'
        send_resolved: true

  # Infrastructure team
  - name: 'infra-team'
    slack_configs:
      - channel: '#infra-alerts'
        send_resolved: true
    email_configs:
      - to: 'infra@your-domain.com'
        send_resolved: true

  # Warning digest
  - name: 'warning-digest'
    email_configs:
      - to: 'dev-team@your-domain.com'
        send_resolved: true
        headers:
          Subject: '[WARNINGS] {{ .CommonAnnotations.summary }}'

# Inhibition rules
inhibit_rules:
  # Suppress warnings if critical alert is firing for same alertname
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # Suppress infrastructure warnings if service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: 'High.*'
    equal: ['instance']
