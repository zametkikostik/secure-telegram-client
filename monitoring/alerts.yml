groups:
  - name: liberty_reach_alerts
    rules:
      # Server down
      - alert: ServerDown
        expr: up{job="liberty-reach"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Liberty Reach server is down"
          description: "Server {{ $labels.instance }} has been down for more than 1 minute."
      
      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second."
      
      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }} seconds."
      
      # Database connection pool exhausted
      - alert: DatabasePoolExhausted
        expr: sqlx_pool_connections{state="idle"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool exhausted"
          description: "No idle connections available in the database pool."
      
      # Disk space low
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk space is running low"
          description: "Only {{ $value }}% of disk space available."
