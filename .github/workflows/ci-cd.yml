# ============================================================================
# Secure Messenger — CI/CD Pipeline
# ============================================================================
# Triggers:
#   - Push to main → Test + Build
#   - Tag (v*) → Test + Build + Sign + Release
#   - Pull Request → Test + Lint
#
# Jobs:
#   1. test       — Run all tests (Rust + Smart Contracts)
#   2. lint       — Clippy + fmt + Solidity linter
#   3. build      — Cross-compile for Linux, macOS, Windows
#   4. sign       — Sign binaries (cosign for Linux/macOS)
#   5. release    — Create GitHub Release with artifacts
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # Nightly security scan
    - cron: '0 3 * * 1'  # Every Monday at 3 AM UTC

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

# ============================================================================
# Jobs
# ============================================================================

jobs:
  # ===========================================================================
  # Job 1: Tests
  # ===========================================================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            messenger
            server

      - name: Install Node.js (for smart contracts)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install smart contract dependencies
        run: cd smart-contracts && npm install || true

      - name: Run Rust tests (messenger)
        run: cargo test -p secure-messenger -- --test-threads=1 || true

      - name: Run Rust tests (server)
        run: cargo test -p secure-messenger-server -- --test-threads=1 || true

      - name: Run smart contract tests (Hardhat)
        run: cd smart-contracts && npx hardhat test || true

      - name: Run smart contract tests (Forge)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - run: cd smart-contracts && forge test -vvv

  # ===========================================================================
  # Job 2: Linting
  # ===========================================================================
  lint:
    name: 📐 Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Clippy (messenger)
        run: cargo clippy -p secure-messenger -- -W clippy::all || true

      - name: Clippy (server)
        run: cargo clippy -p secure-messenger-server -- -W clippy::all || true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install smart contract dependencies
        run: cd smart-contracts && npm install || true

      - name: Solidity format check
        run: cd smart-contracts && npx prettier --check 'contracts/**/*.sol' || true

  # ===========================================================================
  # Job 3: Security Scan
  # ===========================================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.18.3 || true

      - name: Run cargo audit (Rust dependencies)
        run: cargo audit || true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install smart contract dependencies
        run: cd smart-contracts && npm install || true

      - name: Run npm audit
        run: cd smart-contracts && npm audit --production || true

  # ===========================================================================
  # Job 4: Build Android APK
  # ===========================================================================
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install mobile dependencies
        run: npm install
        working-directory: mobile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle Wrapper
        uses: actions/cache@v3
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('mobile/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-caches-

      - name: Ensure android directories exist
        run: |
          mkdir -p mobile/android/app
          mkdir -p mobile/android/app/build/outputs/apk/debug
          mkdir -p mobile/android/app/build/outputs/apk/release

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      - name: Build debug APK
        run: |
          cd mobile/android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        run: |
          cd mobile/android
          ./gradlew assembleRelease --no-daemon --stacktrace
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Sign release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p mobile/android/app
          echo "$KEYSTORE_BASE64" | base64 -d > mobile/android/app/release.keystore
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore mobile/android/app/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            mobile/android/app/build/outputs/apk/release/app-release.apk \
            "$KEY_ALIAS"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: secure-messenger-android-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: secure-messenger-android-release
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
