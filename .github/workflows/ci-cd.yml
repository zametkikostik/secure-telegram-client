# ============================================================================
# Secure Messenger — CI/CD Pipeline
# ============================================================================
# Triggers:
#   - Push to main → Test + Build
#   - Tag (v*) → Test + Build + Sign + Release
#   - Pull Request → Test + Lint
#
# Jobs:
#   1. test       — Run all tests (Rust + Smart Contracts)
#   2. lint       — Clippy + fmt + Solidity linter
#   3. build      — Cross-compile for Linux, macOS, Windows
#   4. sign       — Sign binaries (cosign for Linux/macOS)
#   5. release    — Create GitHub Release with artifacts
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # Nightly security scan
    - cron: '0 3 * * 1'  # Every Monday at 3 AM UTC

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: '1.75'
  NODE_VERSION: '20'

# ============================================================================
# Jobs
# ============================================================================

jobs:
  # ===========================================================================
  # Job 1: Tests
  # ===========================================================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            messenger
            server

      - name: Install Node.js (for smart contracts)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install smart contract dependencies
        run: cd smart-contracts && npm ci

      - name: Run Rust tests (messenger)
        run: cargo test -p secure-messenger --locked

      - name: Run Rust tests (server)
        run: cargo test -p secure-messenger-server --locked

      - name: Run smart contract tests (Hardhat)
        run: cd smart-contracts && npx hardhat test

      - name: Run smart contract tests (Forge)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly
      - run: cd smart-contracts && forge test -vvv

  # ===========================================================================
  # Job 2: Linting
  # ===========================================================================
  lint:
    name: 📐 Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Clippy (messenger)
        run: cargo clippy -p secure-messenger -- -D warnings

      - name: Clippy (server)
        run: cargo clippy -p secure-messenger-server -- -D warnings

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install smart contract dependencies
        run: cd smart-contracts && npm ci

      - name: Solidity format check
        run: cd smart-contracts && npx prettier --check 'contracts/**/*.sol' || true

  # ===========================================================================
  # Job 3: Security Scan
  # ===========================================================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit (Rust dependencies)
        run: cargo audit

      - name: Run cargo-deny (license + security)
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check bans licenses sources

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install smart contract dependencies
        run: cd smart-contracts && npm ci

      - name: Run npm audit
        run: cd smart-contracts && npm audit --production || true

      - name: Run Slither (Solidity static analysis)
        uses: crytic/slither-action@v0.4.0
        with:
          target: 'smart-contracts/'
          slither-args: '--detect reentrancy-eth,reentrancy-no-eth,tx-origin'
          fail-on: 'high'

  # ===========================================================================
  # Job 4: Build (cross-compile)
  # ===========================================================================
  build:
    name: 🏗️ Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test, lint]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: secure-messenger-linux
            server_artifact: secure-messenger-server-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: secure-messenger-macos
            server_artifact: secure-messenger-server-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: secure-messenger-windows
            server_artifact: secure-messenger-server-windows
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          rustup target add ${{ matrix.target }}

      - name: Build messenger (release)
        run: cargo build --release --target ${{ matrix.target }} -p secure-messenger --locked

      - name: Build server (release)
        run: cargo build --release --target ${{ matrix.target }} -p secure-messenger-server --locked

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/secure-messenger.exe artifacts/
            cp target/${{ matrix.target }}/release/secure-messenger-server.exe artifacts/
          else
            cp target/${{ matrix.target }}/release/secure-messenger artifacts/
            cp target/${{ matrix.target }}/release/secure-messenger-server artifacts/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
          retention-days: 30

  # ===========================================================================
  # Job 5: Sign & Release (only on tags)
  # ===========================================================================
  release:
    name: 📦 Sign & Release
    runs-on: ubuntu-latest
    needs: [build, security]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write
      id-token: write  # For cosign signing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate checksums
        run: |
          cd release-artifacts
          for dir in */; do
            cd "$dir"
            sha256sum * > SHA256SUMS.txt
            cd ..
          done

      - name: Sign artifacts with cosign
        run: |
          cd release-artifacts
          for dir in */; do
            cd "$dir"
            cosign sign-blob --yes SHA256SUMS.txt > SHA256SUMS.txt.sig 2>/dev/null || true
            cd ..
          done

      - name: Generate changelog
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**/*
          body: |
            ## 🚀 Secure Messenger ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changes }}

            ### 🔐 Security
            - All binaries signed with cosign
            - SHA256 checksums included
            - Dependencies audited with cargo-audit + Slither

            ### 📋 Installation
            ```bash
            # Verify checksums
            cd secure-messenger-linux
            sha256sum -c SHA256SUMS.txt

            # Verify signature (if cosign installed)
            cosign verify-blob --key cosign.pub --signature SHA256SUMS.txt.sig SHA256SUMS.txt
            ```

            ### 📄 Full Changelog
            ${{ github.server_url }}/${{ github.repository }}/compare/${{ github.ref_name }}...HEAD
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: self-hosting/docker/Dockerfile
          push: true
          tags: |
            kostik/secure-messenger-server:latest
            kostik/secure-messenger-server:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
        env:
          DOCKER_BUILDKIT: 1

  # ===========================================================================
  # Job 6: Deploy to staging (on main push)
  # ===========================================================================
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to staging
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/secure-messenger
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker system prune -f
          EOF

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -sf https://staging.messenger.app/health > /dev/null; then
              echo "✅ Staging healthy"
              exit 0
            fi
            echo "Waiting for staging... ($i/30)"
            sleep 10
          done
          echo "❌ Staging health check failed"
          exit 1
