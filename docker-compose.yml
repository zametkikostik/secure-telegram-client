version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-messenger-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=sqlite:/data/secure-messenger.db
      - JWT_SECRET=${JWT_SECRET:-production-secret-key-change-me}
      - JWT_EXPIRY=86400
      - RUST_LOG=info
      - PORT=3000
    volumes:
      - db-data:/data
      - uploads-data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-slim
    container_name: secure-messenger-frontend
    restart: unless-stopped
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "cd /app/frontend && npm install && npm run build && npx serve dist -l 8080 -s"
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_CLOUDFLARE_WORKER_URL=https://secure-messenger-push.zametkikostik.workers.dev
    depends_on:
      - backend

volumes:
  db-data:
  uploads-data:
